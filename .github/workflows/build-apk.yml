name: Build APK

# Builds an installable debug APK on every push, and on demand.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write   # needed to publish the APK as a release asset

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: azan-ulm-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish APK to the "latest" release (direct download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest debug APK
          files: app/build/outputs/apk/debug/app-debug.apk
